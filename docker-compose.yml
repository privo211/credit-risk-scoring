version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: credit_user
      POSTGRES_PASSWORD: credit_pass
      POSTGRES_DB: credit_risk
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit_user -d credit_risk"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CREDIT_DATABASE_URL: "postgresql+asyncpg://credit_user:credit_pass@db:5432/credit_risk"
      CREDIT_DEBUG: "false"
      CREDIT_LOG_LEVEL: "INFO"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro

volumes:
  postgres_data:
